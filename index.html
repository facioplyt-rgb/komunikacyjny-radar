<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR SYSTEM V45 | FULL SOURCE NO CUTS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --main: #f59e0b; 
            --dark: #0f172a; 
            --danger: #ef4444;
            --success: #10b981;
            --bg-light: #f8fafc;
        }

        /* RESET I BAZA */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark); 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        #map { 
            height: 100vh; 
            width: 100%; 
            z-index: 1; 
            filter: contrast(1.08) saturate(1.1); 
        }

        /* EKRAN POWITALNY */
        #city-selector { 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            background: var(--bg-light); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* SZKŁO I EFEKTY */
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); 
        }
        
        /* BOTTOM SHEETS */
        .sheet { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            z-index: 1000; 
            transform: translateY(110%); 
            transition: transform 0.5s cubic-bezier(0.3, 1, 0.3, 1); 
            max-width: 550px; 
            margin: 0 auto; 
            border-radius: 45px 45px 0 0;
            box-shadow: 0 -25px 60px rgba(0,0,0,0.2);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .sheet.open { transform: translateY(0); }
        
        /* RADAR TOAST - PO LEWEJ */
        #radar-toast { 
            position: fixed; 
            top: 130px; 
            left: 20px; 
            right: 20px; 
            z-index: 2000;
            transform: translateX(-160%); 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 450px; 
            margin: 0 auto;
        }
        #radar-toast.active { transform: translateX(0); }

        /* MARKERY MAPY */
        .custom-marker { 
            width: 56px; 
            height: 56px; 
            border-radius: 20px; 
            border: 3px solid #fff;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            color: white; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .custom-marker:active { transform: scale(0.85); }
        
        .pulse-red { animation: pulse-red 1.8s infinite; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); } 
            70% { box-shadow: 0 0 0 22px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }
        
        .line-badge { 
            background: rgba(0,0,0,0.45); 
            padding: 2px 9px; 
            border-radius: 9px; 
            font-size: 10px; 
            font-weight: 800; 
            margin-top: 3px;
            letter-spacing: -0.2px;
        }
        
        /* INTERAKCJE */
        .btn-press { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
        }
        .btn-press:active { transform: scale(0.92); filter: brightness(0.9); }

        /* SCROLLBAR */
        .dir-scroll::-webkit-scrollbar { width: 5px; }
        .dir-scroll::-webkit-scrollbar-track { background: transparent; }
        .dir-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 12px; }

        /* HINT BOX */
        .tap-hint-box {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: var(--dark);
            color: white;
            padding: 18px 35px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.5);
            border: 2px solid var(--main);
            pointer-events: none;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -20px); }
        }

        /* SKELETON LOADERS & OTHER DETAILS */
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // CONFIG (Niezmienny)
        const firebaseConfig = {
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio",
            storageBucket: "mzk-by-facio.appspot.com",
            messagingSenderId: "676970411647",
            appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false, 
            tap: false,
            maxZoom: 18
        });
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // STATE
        let cityKey = '';
        let uPos = null;
        let sType = '';
        let sIcon = '';
        let tMarker = null;
        let tCoords = null;
        let masterDirs = [];
        let clickLock = false;
        const mCache = {};
        const uid = localStorage.getItem('mzk_uid_v45') || Math.random().toString(36).substr(2, 12);
        localStorage.setItem('mzk_uid_v45', uid);

        // POMOCNICZE
        function timeAgo(ts) {
            if(!ts) return "---";
            const diff = Math.floor((Date.now() - ts) / 60000);
            if(diff < 1) return "Teraz";
            if(diff < 60) return `${diff}m temu`;
            return `${Math.floor(diff/60)}h temu`;
        }

        async function getRoadName(la, ln) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${la}&lon=${ln}&zoom=18`);
                const d = await r.json();
                return d.address.road || d.address.pedestrian || d.address.suburb || "Punkt na trasie";
            } catch { return "Lokalizacja nieznana"; }
        }

        // START APLIKACJI
        window.startApp = (key, coords) => {
            cityKey = key;
            document.getElementById('city-selector').style.opacity = '0';
            setTimeout(() => document.getElementById('city-selector').style.display = 'none', 800);
            
            document.getElementById('fab-container').style.opacity = '1';
            document.getElementById('fab-container').style.pointerEvents = 'auto';
            document.getElementById('fab-container').style.transform = 'translateY(0)';
            document.getElementById('city-title').innerText = key.toUpperCase();
            
            map.setView(coords, 14);
            map.locate({ setView: true, maxZoom: 16, watch: true });

            // NASŁUCH ALERTS (v38)
            onValue(ref(db, `v38/${cityKey}/alerts`), (snap) => {
                const data = snap.val();
                const currentIds = data ? Object.keys(data) : [];
                
                // Czyścimy nieistniejące
                Object.keys(mCache).forEach(id => { 
                    if(!currentIds.includes(id)) { 
                        map.removeLayer(mCache[id]); 
                        delete mCache[id]; 
                    }
                });
                
                if (data) {
                    Object.entries(data).forEach(([id, val]) => {
                        if (!mCache[id]) {
                            const color = val.type === 'KONTROLA' ? '#ef4444' : (val.type === 'AWARIA' ? '#f97316' : '#2563eb');
                            const html = `<div class="custom-marker ${val.type === 'KONTROLA' ? 'pulse-red' : ''}" style="background:${color}">
                                <div class="text-2xl mt-1">${val.icon}</div>
                                <div class="line-badge">${val.line || '??'}</div>
                            </div>`;
                            
                            mCache[id] = L.marker([val.lat, val.lng], {
                                icon: L.divIcon({ className: '', html: html, iconAnchor: [28, 28] })
                            }).addTo(map).on('click', () => openVote(id, val));
                        }
                    });
                    checkProximity(data);
                }
            });

            // NASŁUCH KIERUNKÓW (v38)
            onValue(ref(db, `v38/${cityKey}/config`), (snap) => {
                masterDirs = snap.val() || [];
                refreshList(masterDirs);
            });
        };

        // GPS ENGINE
        map.on('locationfound', (e) => {
            uPos = e.latlng;
            document.getElementById('gps-info').innerText = "POŁĄCZONO Z GPS";
            document.getElementById('gps-info').style.color = "#10b981";
            document.getElementById('gps-dot').style.backgroundColor = "#10b981";
            
            if(!window.dot) {
                window.dot = L.circleMarker(e.latlng, { radius: 13, color: '#fff', weight: 5, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            } else {
                window.dot.setLatLng(e.latlng);
            }
        });

        // RADAR ALERTY (LEWA STRONA)
        function checkProximity(alerts) {
            if(!uPos || !alerts) return;
            Object.values(alerts).forEach(r => {
                const distance = Math.round(uPos.distanceTo(L.latLng(r.lat, r.lng)));
                // Radar reaguje na zdarzenia bliżej niż 450m
                if(distance < 450) {
                    document.getElementById('toast-icon').innerHTML = r.icon;
                    document.getElementById('toast-type-label').innerText = r.type;
                    document.getElementById('toast-street').innerText = r.street || "W pobliżu trasy";
                    document.getElementById('toast-dir').innerText = "KIERUNEK: " + (r.dir || "Nieznany");
                    document.getElementById('toast-dist').innerText = distance + "m";
                    document.getElementById('radar-toast').classList.add('active');
                    
                    document.getElementById('alert-sound').play().catch(e => {});
                }
            });
        }
        window.hideToast = () => document.getElementById('radar-toast').classList.remove('active');

        // ZGŁASZANIE
        window.triggerReport = () => {
            if(clickLock) return;
            const hint = document.createElement('div');
            hint.className = "tap-hint-box";
            hint.id = "tap-hint";
            hint.innerHTML = `Dotknij miejsca na mapie`;
            document.body.appendChild(hint);
            
            map.once('click', (e) => {
                tCoords = e.latlng;
                document.getElementById('tap-hint').remove();
                if(tMarker) map.removeLayer(tMarker);
                tMarker = L.circle(e.latlng, { radius: 35, color: '#f59e0b', fillOpacity: 0.5, weight: 3 }).addTo(map);
                openSheet('modal-type');
            });
        };

        window.selectType = (type, icon) => { sType = type; sIcon = icon; openSheet('modal-dirs'); };
        window.fillDirection = (dir) => { document.getElementById('search-dir').value = dir; };

        window.submitFormManual = async () => {
            if(clickLock) return;
            clickLock = true;
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> WYSYŁANIE...`;
            
            const lineVal = document.getElementById('input-line').value.trim() || "??";
            const dirVal = document.getElementById('search-dir').value.trim() || "Nieokreślony";
            const streetName = await getRoadName(tCoords.lat, tCoords.lng);
            
            const alertRef = push(ref(db, `v38/${cityKey}/alerts`));
            set(alertRef, {
                type: sType, icon: sIcon, dir: dirVal, line: lineVal, street: streetName,
                lat: tCoords.lat, lng: tCoords.lng, author: uid, 
                createdAt: Date.now(), lastVote: Date.now(), votes: 1
            }).then(() => {
                closeModals();
                clickLock = false;
                btn.innerHTML = `Wyślij do chmury <i class="fa-solid fa-cloud-arrow-up ml-2"></i>`;
            });
        };

        // GŁOSOWANIE I INFO
        window.openVote = (id, data) => {
            openSheet('modal-vote');
            document.getElementById('v-icon').innerHTML = data.icon;
            document.getElementById('v-title').innerText = data.type;
            document.getElementById('v-line').innerText = "LINIA " + data.line;
            document.getElementById('v-dir').innerText = data.dir;
            document.getElementById('v-street').innerText = data.street || "";
            document.getElementById('v-created').innerText = timeAgo(data.createdAt);
            document.getElementById('v-last').innerText = timeAgo(data.lastVote);
            document.getElementById('v-votes').innerText = data.votes || 1;
            
            document.getElementById('v-ok').onclick = () => {
                if(clickLock) return;
                clickLock = true;
                update(ref(db, `v38/${cityKey}/alerts/${id}`), { 
                    lastVote: Date.now(),
                    votes: increment(1)
                }).then(() => { closeModals(); clickLock = false; });
            };
            
            const delBtn = document.getElementById('v-del');
            delBtn.classList.toggle('hidden', data.author !== uid);
            delBtn.onclick = () => { 
                remove(ref(db, `v38/${cityKey}/alerts/${id}`)); 
                closeModals(); 
            };
        };

        // PANEL ADMINA (v38)
        window.adminLogin = () => { if(prompt("Hasło operatora:") === "mzk2026") toggleAdminView(true); };
        window.toggleAdminView = (state) => {
            document.getElementById('admin-view').classList.toggle('hidden', !state);
            if(state) document.getElementById('admin-input').value = masterDirs.join('\n');
        };
        window.pushConfig = () => {
            const lines = document.getElementById('admin-input').value.split('\n').filter(l => l.trim() !== "");
            set(ref(db, `v38/${cityKey}/config`), lines).then(() => { 
                alert("Synchronizacja v38 pomyślna!"); 
                toggleAdminView(false); 
            });
        };

        // UI HELPERS
        window.openSheet = (id) => {
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
            document.getElementById(id).classList.add('open');
            document.getElementById('fab-container').style.opacity = '0';
        };
        
        window.closeModals = () => {
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
            document.getElementById('fab-container').style.opacity = '1';
            if(tMarker) { map.removeLayer(tMarker); tMarker = null; }
        };

        function refreshList(list) {
            const container = document.getElementById('list-dirs');
            container.innerHTML = list.map(dir => `
                <button onclick="fillDirection('${dir}')" class="w-full bg-white border-2 border-slate-50 p-6 rounded-[32px] text-left font-black text-sm text-slate-800 btn-press flex items-center justify-between shadow-sm">
                    <span>${dir}</span><i class="fa-solid fa-chevron-right text-slate-200"></i>
                </button>
            `).join('');
        }
        
        window.runSearch = () => {
            const query = document.getElementById('search-dir').value.toLowerCase();
            refreshList(masterDirs.filter(d => d.toLowerCase().includes(query)));
        };
    </script>
</body>
</html>
