<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RADAR SYSTEM V48 | FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #f59e0b; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        #map { height: 100%; width: 100%; z-index: 1; filter: contrast(1.05) saturate(1.1); }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; transform: translateY(110%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-width: 550px; margin: 0 auto; border-radius: 40px 40px 0 0; padding: 32px; box-shadow: 0 -20px 50px rgba(0,0,0,0.2); }
        .sheet.open { transform: translateY(0); }
        .custom-marker { width: 60px; height: 60px; border-radius: 22px; border: 4px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .pulse { animation: p 2s infinite; }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .btn-press:active { transform: scale(0.95); }
        .notif-active { background: var(--main) !important; color: white !important; border-color: var(--main) !important; }
    </style>
</head>
<body>
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" preload="auto"></audio>

    <div id="start-screen" class="fixed inset-0 z-[9999] bg-slate-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-sm">
            <i class="fa-solid fa-tower-broadcast text-7xl text-amber-500 mb-6"></i>
            <h1 class="text-4xl font-black italic uppercase mb-2">Radar MZK</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-[0.3em] mb-10">GORZÓW ENGINE V48</p>
            <button onclick="boot()" class="w-full py-6 bg-slate-900 text-white rounded-[30px] font-black italic uppercase btn-press">Uruchom</button>
        </div>
    </div>

    <div class="fixed top-6 inset-x-4 z-[500] max-w-xl mx-auto pointer-events-none">
        <div class="glass p-4 rounded-[35px] flex justify-between items-center pointer-events-auto shadow-xl">
            <div class="flex items-center gap-4 pl-2">
                <i class="fa-solid fa-satellite-dish text-amber-500 text-xl animate-pulse"></i>
                <div><h2 class="text-[11px] font-black uppercase text-slate-900">Gorzów Wlkp.</h2><p id="gps" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Szukam GPS...</p></div>
            </div>
            <div class="flex gap-2">
                <button id="radar-btn" onclick="toggleRadar()" class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-slate-400 btn-press border border-slate-100"><i class="fa-solid fa-bell"></i></button>
                <button onclick="admin()" class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-slate-400 btn-press border border-slate-100"><i class="fa-solid fa-fingerprint"></i></button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="fab" class="fixed bottom-10 inset-x-0 z-[500] flex justify-center px-6 opacity-0 translate-y-10 transition-all duration-700">
        <button onclick="initReport()" class="w-full max-w-md bg-slate-900 text-white py-8 rounded-[35px] font-black shadow-2xl btn-press border-b-8 border-amber-600 uppercase italic">+ Dodaj Zgłoszenie</button>
    </div>

    <div id="sheet-type" class="sheet glass">
        <div class="grid grid-cols-3 gap-4">
            <button onclick="setT('KONTROLA', 'fa-user-secret', '#ef4444')" class="flex flex-col items-center gap-4 p-8 bg-red-50 rounded-[35px] text-red-600 btn-press border-2 border-red-100"><i class="fa-solid fa-user-secret text-4xl"></i><span class="text-[9px] font-black uppercase">Bilety</span></button>
            <button onclick="setT('AWARIA', 'fa-triangle-exclamation', '#f59e0b')" class="flex flex-col items-center gap-4 p-8 bg-orange-50 rounded-[35px] text-orange-600 btn-press border-2 border-orange-100"><i class="fa-solid fa-triangle-exclamation text-4xl"></i><span class="text-[9px] font-black uppercase">Awaria</span></button>
            <button onclick="setT('KOREK', 'fa-clock', '#3b82f6')" class="flex flex-col items-center gap-4 p-8 bg-blue-50 rounded-[35px] text-blue-600 btn-press border-2 border-blue-100"><i class="fa-solid fa-clock text-4xl"></i><span class="text-[9px] font-black uppercase">Korek</span></button>
        </div>
    </div>

    <div id="sheet-form" class="sheet glass">
        <div class="flex gap-4 mb-6"><input type="text" id="ln" placeholder="00" class="w-1/4 p-6 bg-slate-100 rounded-[28px] font-black text-2xl text-center outline-none"><input type="text" id="sr" placeholder="Kierunek..." class="w-3/4 p-6 bg-slate-100 rounded-[28px] font-bold outline-none" oninput="sch()"></div>
        <div id="dl" class="grid gap-2 max-h-[30vh] overflow-y-auto mb-8 pr-2"></div>
        <button onclick="send()" class="w-full bg-amber-500 text-white p-7 rounded-[30px] font-black uppercase shadow-xl border-b-8 border-amber-600 btn-press">Opublikuj</button>
    </div>

    <div id="sheet-vote" class="sheet glass text-center">
        <div id="vi" class="text-8xl mb-4"></div><h2 id="vt" class="text-3xl font-black italic uppercase text-slate-900"></h2><p id="vl" class="text-amber-500 font-black text-5xl mb-8"></p>
        <div class="bg-slate-50 p-6 rounded-[35px] border-2 border-slate-100 mb-8"><p id="vs" class="font-black text-[11px] text-slate-500 uppercase"></p></div>
        <div class="grid grid-cols-2 gap-4"><button id="v-ok" class="bg-slate-900 text-white p-6 rounded-[30px] font-black uppercase italic btn-press shadow-xl">Potwierdzam</button><button onclick="cls()" class="bg-white text-slate-400 p-6 rounded-[30px] font-black uppercase border-2 border-slate-100 btn-press">Błąd</button></div>
    </div>

    <div id="ab" class="hidden fixed inset-0 z-[10000] bg-white p-8 overflow-y-auto">
        <h2 class="text-3xl font-black mb-6 uppercase italic">Baza Kierunków</h2>
        <textarea id="ai" rows="15" class="w-full bg-slate-50 border-4 border-slate-100 rounded-[35px] p-6 font-bold mb-6 outline-none"></textarea>
        <button onclick="svA()" class="w-full bg-slate-900 text-white p-8 rounded-[35px] font-black uppercase btn-press">Zapisz</button>
        <button onclick="toggleA(false)" class="w-full mt-4 text-slate-400 font-bold uppercase text-[10px]">Zamknij</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
        
        const fC = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.appspot.com", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
        const app = initializeApp(fC); const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let uP = null, rA = false, cM = {}, sts = [], tC = null, tM = null, sT = {};
        const uid = localStorage.getItem('r_uid_v48') || Math.random().toString(36).substr(2, 12);
        localStorage.setItem('r_uid_v48', uid);

        window.boot = () => { document.getElementById('start-screen').remove(); document.getElementById('fab').style.opacity = '1'; document.getElementById('fab').style.transform = 'translateY(0)'; map.setView([52.732, 15.237], 14); map.locate({ watch: true, enableHighAccuracy: true }); };

        map.on('locationfound', (e) => { 
            uP = e.latlng; 
            document.getElementById('gps').innerText = "GPS AKTYWNY"; 
            document.getElementById('gps').style.color = "#10b981";
            if(!window.uL) window.uL = L.circleMarker(e.latlng, { radius: 10, color: '#fff', weight: 4, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            else window.uL.setLatLng(e.latlng);
        });

        window.toggleRadar = async () => { 
            if ("Notification" in window) await Notification.requestPermission(); 
            rA = !rA; 
            document.getElementById('radar-btn').classList.toggle('notif-active', rA); 
            alert(rA ? "Smart Radar Włączony" : "Radar Wyłączony"); 
        };

        onValue(ref(db, `v38/gorzow/alerts`), (snap) => {
            const data = snap.val() || {};
            Object.keys(cM).forEach(id => { if(!data[id]) { map.removeLayer(cM[id]); delete cM[id]; }});
            Object.entries(data).forEach(([id, val]) => {
                if(!cM[id]) {
                    const color = val.type === 'KONTROLA' ? '#ef4444' : (val.type === 'AWARIA' ? '#f59e0b' : '#3b82f6');
                    const h = `<div class="custom-marker ${val.type==='KONTROLA'?'pulse':''}" style="background:${color}"><i class="fa-solid ${val.icon} text-xl"></i><div class="line-badge font-black text-[10px] mt-1 uppercase bg-black/20 px-2 rounded">${val.line}</div></div>`;
                    cM[id] = L.marker([val.lat, val.lng], { icon: L.divIcon({ className: '', html: h, iconAnchor: [30, 30] }) }).addTo(map).on('click', () => openV(id, val));
                    if(rA && uP && uP.distanceTo(L.latLng(val.lat, val.lng)) < 500) {
                        new Notification(`Radar: ${val.type}`, { body: `Linia ${val.line} w Twojej okolicy!` });
                        document.getElementById('alert-sound').play().catch(()=>{});
                    }
                }
            });
        });

        onValue(ref(db, `v38/gorzow/config`), (s) => { sts = s.val() || []; dDs(sts); });

        window.initReport = () => { map.once('click', (e) => { tC = e.latlng; if(tM) map.removeLayer(tM); tM = L.circle(e.latlng, { radius: 30, color: '#f59e0b' }).addTo(map); openS('sheet-type'); }); };
        window.setT = (t, i, c) => { sT = { type: t, icon: i, color: c }; openS('sheet-form'); };
        
        window.send = async () => {
            const l = document.getElementById('ln').value || "??", d = document.getElementById('sr').value || "---";
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${tC.lat}&lon=${tC.lng}`);
            const dj = await res.json(); const street = dj.address.road || dj.address.suburb || "Gorzów";
            push(ref(db, `v38/gorzow/alerts`), { ...sT, line: l, dir: d, street: street, lat: tC.lat, lng: tC.lng, author: uid, createdAt: Date.now(), votes: 1 });
            cls(); if(tM) map.removeLayer(tM);
        };

        window.openV = (id, val) => {
            openS('sheet-vote'); document.getElementById('vi').innerHTML = `<i class="fa-solid ${val.icon}" style="color:${val.color}"></i>`;
            document.getElementById('vt').innerText = val.type; document.getElementById('vl').innerText = val.line; document.getElementById('vs').innerText = `${val.street} | Kierunek: ${val.dir}`;
            document.getElementById('v-ok').onclick = () => { update(ref(db, `v38/gorzow/alerts/${id}`), { votes: increment(1) }); cls(); };
        };

        window.openS = (id) => { cls(); document.getElementById(id).classList.add('open'); };
        window.cls = () => document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
        window.dDs = (l) => { document.getElementById('dl').innerHTML = l.map(d => `<button onclick="document.getElementById('sr').value='${d}'" class="w-full text-left p-5 bg-white border rounded-[22px] font-bold btn-press">${d}</button>`).join(''); };
        window.sch = () => dDs(sts.filter(s => s.toLowerCase().includes(document.getElementById('sr').value.toLowerCase())));
        window.admin = () => { if(prompt("Kod:") === "mzk2026") toggleA(true); };
        window.toggleA = (s) => { document.getElementById('ab').classList.toggle('hidden', !s); if(s) document.getElementById('ai').value = sts.join('\n'); };
        window.svA = () => { const l = document.getElementById('ai').value.split('\n').filter(x => x.trim()); set(ref(db, `v38/gorzow/config`), l).then(() => toggleA(false)); };
    </script>
</body>
</html>
