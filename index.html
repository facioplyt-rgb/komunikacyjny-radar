<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | v15.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root { --main: #005bb7; --accent: #ffcc00; }
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .input-box { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--main); background: #0f172a; }
        .white-pre { white-space: pre-wrap; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="p-4">

    <div id="loader">
        <div class="animate-spin text-4xl mb-4 text-amber-500"><i class="fa-solid fa-circle-notch"></i></div>
        <p class="font-bold">PRZESYŁANIE DO BAZY...</p>
    </div>

    <header class="max-w-6xl mx-auto flex justify-between items-center py-6">
        <h1 onclick="location.reload()" class="text-3xl font-black italic cursor-pointer tracking-tighter">EŁK <span class="text-amber-500">EVENTY</span></h1>
        <button onclick="core.openAdmin()" class="glass px-6 py-2 rounded-full text-xs font-bold uppercase hover:bg-slate-700 transition">Panel Admina</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div id="view-home" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div id="news-container" class="md:col-span-2 space-y-6">
                <div class="p-10 text-center text-slate-500 italic">Ładowanie eventów...</div>
            </div>
            <aside class="space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-amber-500 font-black text-xs uppercase mb-4 tracking-widest">O Portalu</h3>
                    <p class="text-slate-400 text-sm leading-relaxed">Najświeższe informacje z Ełku. Wszystko zapisywane w Twojej chmurze Firebase w czasie rzeczywistym.</p>
                </div>
            </aside>
        </div>

        <div id="view-article" class="hidden max-w-4xl mx-auto pb-20">
            <button onclick="core.goHome()" class="mb-8 text-slate-400 hover:text-white font-bold flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> POWRÓT</button>
            <div id="article-content"></div>
        </div>

        <div id="view-admin" class="hidden max-w-2xl mx-auto glass p-8 rounded-[40px] shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic text-amber-500 uppercase">Nowy Artykuł</h2>
                <button onclick="core.goHome()" class="text-slate-500 text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="TYTUŁ WYDARZENIA" class="input-box font-bold">
                <input type="text" id="in-author" placeholder="TWOJE IMIĘ / REDAKCJA" class="input-box">
                <textarea id="in-content" rows="8" placeholder="TREŚĆ ARTYKUŁU..." class="input-box"></textarea>
                <div class="p-6 border-2 border-dashed border-slate-700 rounded-2xl text-center">
                    <input type="file" id="in-files" multiple accept="image/*" class="hidden">
                    <label for="in-files" class="cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-500 mb-2"></i>
                        <p class="text-xs font-bold text-slate-400 uppercase">Kliknij, aby dodać zdjęcia</p>
                    </label>
                    <div id="file-preview" class="flex flex-wrap gap-2 mt-4 justify-center"></div>
                </div>
                <button onclick="core.publish()" id="btn-pub" class="w-100 bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black uppercase tracking-widest transition-all w-full shadow-lg">Opublikuj na stronie</button>
                <div id="admin-list" class="mt-10 space-y-2 pt-10 border-t border-slate-700"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // --- KONFIGURACJA Z TWOJEGO SCREENA ---
        const firebaseConfig = {
            apiKey: "TWOJE_API_KEY",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", // KONIECZNIE SPRAWDŹ TEN ADRES
            projectId: "mzk-by-facio",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.core = {
            goHome: () => {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-article').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                window.scrollTo(0,0);
            },

            openAdmin: () => {
                if(prompt("HASŁO:") === "diax67") {
                    document.getElementById('view-home').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                }
            },

            publish: async () => {
                const t = document.getElementById('in-title').value;
                const c = document.getElementById('in-content').value;
                const a = document.getElementById('in-author').value || "Redakcja";
                const files = document.getElementById('in-files').files;

                if(!t || !c) return alert("Tytuł i treść są wymagane!");

                document.getElementById('loader').style.display = 'flex';

                let images = [];
                for(let f of files) {
                    const b64 = await new Promise(res => {
                        const r = new FileReader();
                        r.readAsDataURL(f);
                        r.onload = () => res(r.result);
                    });
                    images.push(b64);
                }

                try {
                    await push(ref(db, 'elk/posts'), {
                        title: t, content: c, author: a, images: images,
                        timestamp: Date.now(), date: new Date().toLocaleString()
                    });
                    location.reload();
                } catch(e) {
                    alert("BŁĄD: " + e.message);
                    document.getElementById('loader').style.display = 'none';
                }
            },

            delete: (id) => confirm("Usunąć ten artykuł?") && remove(ref(db, `elk/posts/${id}`)),

            showFull: (id, data) => {
                document.getElementById('view-home').classList.add('hidden');
                const view = document.getElementById('view-article');
                view.classList.remove('hidden');
                
                let imgs = (data.images || []).map(i => `<img src="${i}" class="w-full rounded-[30px] shadow-2xl mb-8">`).join('');
                
                document.getElementById('article-content').innerHTML = `
                    <h1 class="text-5xl font-black italic mb-4 leading-tight">${data.title}</h1>
                    <div class="flex gap-4 text-amber-500 font-bold text-xs uppercase mb-10 pb-4 border-b border-slate-800">
                        <span><i class="fa-solid fa-user mr-2"></i>${data.author}</span>
                        <span><i class="fa-solid fa-calendar mr-2"></i>${data.date}</span>
                    </div>
                    <div class="text-slate-300 text-xl leading-relaxed white-pre mb-12">${data.content}</div>
                    <div class="space-y-4">${imgs}</div>
                `;
                window.scrollTo(0,0);
            }
        };

        // PODGLĄD ZDJĘĆ
        document.getElementById('in-files').onchange = (e) => {
            const prev = document.getElementById('file-preview');
            prev.innerHTML = "";
            [...e.target.files].forEach(f => {
                const url = URL.createObjectURL(f);
                prev.innerHTML += `<img src="${url}" class="w-12 h-12 object-cover rounded-lg border border-slate-600">`;
            });
        };

        // SYNCHRONIZACJA
        onValue(ref(db, 'elk/posts'), (snap) => {
            const feed = document.getElementById('news-container');
            const adm = document.getElementById('admin-list');
            feed.innerHTML = ""; adm.innerHTML = "<h3 class='text-xs font-bold text-slate-500 mb-4'>LISTA WPISÓW:</h3>";
            
            const data = snap.val();
            if(!data) {
                feed.innerHTML = "<div class='glass p-20 text-center rounded-3xl text-slate-500'>Brak eventów w bazie Ełk.</div>";
                return;
            }

            const entries = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);

            entries.forEach(([id, v]) => {
                // Do Admina
                adm.innerHTML += `<div class="flex justify-between items-center glass p-4 rounded-xl border-l-4 border-amber-500">
                    <span class="text-xs font-bold truncate mr-4">${v.title}</span>
                    <button onclick="core.delete('${id}')" class="text-red-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>`;

                // Do Feedu
                const thumb = v.images ? v.images[0] : '';
                const card = document.createElement('div');
                card.className = "card glass rounded-[30px]";
                card.innerHTML = `
                    ${thumb ? `<img src="${thumb}" class="w-full h-64 object-cover">` : ''}
                    <div class="p-8">
                        <h2 class="text-2xl font-black mb-3 italic">${v.title}</h2>
                        <p class="text-slate-400 text-sm line-clamp-2 mb-6">${v.content}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-amber-500 uppercase tracking-tighter">${v.date}</span>
                            <span class="text-xs font-bold text-white group-hover:text-amber-500 transition">CZYTAJ WIĘCEJ <i class="fa-solid fa-chevron-right ml-1"></i></span>
                        </div>
                    </div>`;
                card.onclick = () => core.showFull(id, v);
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>
