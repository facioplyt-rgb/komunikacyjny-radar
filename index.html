<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ełk Nasze Eventy | Portal v42</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0056b3; --yellow: #ffcc00; --dark: #0f0f0f; --card: #1a1a1a; --text: #f5f5f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--text); line-height: 1.6; }

        /* --- HEADER --- */
        header { background: #000; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        .h-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 28px; font-weight: 900; color: #fff; cursor: pointer; text-transform: uppercase; text-decoration: none; }
        .logo span { color: var(--yellow); }
        .btn-admin { background: var(--blue); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        /* --- NEWS GRID --- */
        .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .card-img { height: 220px; width: 100%; object-fit: cover; background: #000; }
        .card-body { padding: 20px; }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .card-snip { color: #999; font-size: 14px; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- FULL ARTICLE --- */
        .article-full { background: var(--card); padding: 40px; border-radius: 15px; grid-column: span 2; max-width: 900px; margin: 0 auto; }
        .art-body { font-size: 18px; line-height: 1.8; margin: 30px 0; white-space: pre-wrap; color: #ddd; }
        .gallery img { width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* --- ADMIN PANEL --- */
        .admin-box { background: var(--card); padding: 30px; border-radius: 15px; grid-column: span 2; }
        input, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .btn-save { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .hidden { display: none !important; }
        #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; color: var(--yellow); font-weight: bold; }
        
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loader">Wysyłanie do v42... Proszę czekać...</div>

<header>
    <div class="h-container">
        <div class="logo" onclick="location.reload()">Ełk <span>Nasze Eventy</span></div>
        <button class="btn-admin" onclick="checkAuth()">Panel Admina</button>
    </div>
</header>

<div class="container">
    <div id="view-home" style="display:contents">
        <main><div class="news-grid" id="news-grid"></div></main>
        <aside>
            <h3 style="border-bottom: 2px solid var(--blue); padding-bottom:10px; margin-bottom:20px">LINKI</h3>
            <div id="links-list"></div>
        </aside>
    </div>

    <div id="view-article" class="hidden" style="grid-column: span 2;">
        <button onclick="showView('home')" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-bottom:20px">← Powrót</button>
        <div class="article-full" id="article-content"></div>
    </div>

    <div id="view-login" class="hidden" style="grid-column: span 2;">
        <div style="max-width: 400px; margin: 100px auto; background: var(--card); padding: 40px; border-radius: 15px; text-align: center;">
            <h2>Hasło Admina</h2>
            <input type="password" id="pass" style="margin-top:20px; text-align:center">
            <button class="btn-save" onclick="login()">Zaloguj</button>
        </div>
    </div>

    <div id="view-admin" class="hidden" style="grid-column: span 2;">
        <div class="admin-box">
            <h2>Dodaj nowy wpis do v42</h2>
            <input type="text" id="title" placeholder="Tytuł eventu">
            <input type="text" id="author" placeholder="Autor">
            <textarea id="content" rows="10" placeholder="Pełny opis artykułu..."></textarea>
            <label>Dodaj zdjęcia (możesz wybrać kilka):</label>
            <input type="file" id="imgs" multiple accept="image/*" style="margin-top:10px">
            <button class="btn-save" onclick="savePost()">OPUBLIKUJ W CHMURZE</button>
            <div id="admin-posts" style="margin-top:40px"></div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA (WKLEJ SWOJE DANE) ---
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebaseio.com",
        projectId: "mzk-by-facio",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const root = "v42";

    function showView(v) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('view-'+v).classList.remove('hidden');
    }

    function checkAuth() { sessionStorage.getItem('admin') ? showView('admin') : showView('login'); }
    function login() { if(document.getElementById('pass').value === 'diax67') { sessionStorage.setItem('admin', '1'); showView('admin'); } }

    async function savePost() {
        const t = document.getElementById('title').value;
        const c = document.getElementById('content').value;
        const a = document.getElementById('author').value;
        const f = document.getElementById('imgs').files;

        if(!t || !c) return alert("Wypełnij dane!");
        document.getElementById('loader').style.display = 'flex';

        let pics = [];
        for(let file of f) { pics.push(await toB64(file)); }

        await db.ref(root + "/posts").push({
            title: t, content: c, author: a, images: pics,
            date: new Date().toLocaleString(), ts: Date.now()
        });

        location.reload();
    }

    const toB64 = file => new Promise(res => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result); });

    // Pobieranie postów
    db.ref(root + "/posts").on('value', snap => {
        const grid = document.getElementById('news-grid');
        const adm = document.getElementById('admin-posts');
        grid.innerHTML = ""; adm.innerHTML = "<h3>Zarządzaj postami:</h3>";
        
        let data = [];
        snap.forEach(c => { data.push({id: c.key, ...c.val()}); });
        data.sort((a,b) => b.ts - a.ts);

        data.forEach(p => {
            const img = p.images ? p.images[0] : '';
            // Karta na stronę główną (skrócona)
            grid.innerHTML += `
                <div class="card" onclick="openFull('${p.id}')">
                    <img src="${img}" class="card-img">
                    <div class="card-body">
                        <div class="card-title">${p.title}</div>
                        <div class="card-snip">${p.content}</div>
                        <small style="color:var(--yellow)">${p.date}</small>
                    </div>
                </div>`;
            // Lista w adminie
            adm.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
                <span>${p.title}</span>
                <button onclick="db.ref('${root}/posts/${p.id}').remove()" style="color:red; background:none; border:none; cursor:pointer">USUŃ</button>
            </div>`;
        });
    });

    async function openFull(id) {
        const s = await db.ref(root + "/posts/" + id).once('value');
        const p = s.val();
        let imgs = (p.images || []).map(i => `<img src="${i}">`).join('');
        
        document.getElementById('article-content').innerHTML = `
            <h1 style="font-size:35px">${p.title}</h1>
            <p style="margin:10px 0; color:var(--yellow)">Autor: ${p.author} | ${p.date}</p>
            <div class="art-body">${p.content}</div>
            <div class="gallery">${imgs}</div>
        `;
        showView('article');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
